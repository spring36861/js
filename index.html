<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統功能選單</title>
    <style>
        /* (樣式維持原本不變) */
        body { font-family: "Noto Sans TC", "微軟正黑體", sans-serif; background-color: #f4f6f8; margin: 0; padding: 0; }
        .header { background: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 20px; letter-spacing: 1px; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .module-title { color: #34495e; border-bottom: 2px solid #bdc3c7; padding-bottom: 10px; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; padding: 25px 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid #ecf0f1; border-top: 4px solid #3498db; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); filter: brightness(0.98); }
        .card h3 { margin: 0 0 10px 0; color: #2c3e50; font-size: 18px; }
        .card p { margin: 0; color: #7f8c8d; font-size: 13px; }
        .card-form1 { border-top-color: #3498db; }
        .card-form2 { border-top-color: #e74c3c; }
        .card-admin { border-top-color: #9b59b6; }
    </style>
</head>
<body>
    <div class="header">
        <h1>中機 - 檢查業務系統 (本機/GitHub版)</h1>
    </div>

    <div class="container">
        <h2 class="module-title">請選擇作業項目</h2>
        <div class="grid">
            <div class="card card-form1" onclick="window.location.href='form1.html'">
                <h3>壓力容器檢查報告</h3>
                <p>主功能-1 (支援 13A / 14A 範本)</p>
            </div>
            <div class="card card-form2" onclick="window.location.href='form2.html'">
                <h3>鍋爐明細表</h3>
                <p>主功能-2 (支援 17A 範本)</p>
            </div>
            <div class="card card-admin" onclick="window.location.href='phrase.html'">
                <h3>本機詞庫維護</h3>
                <p>管理瀏覽器常用詞、匯出/匯入詞庫檔</p>
            </div>
        </div>
    </div>
</body>
</html>
